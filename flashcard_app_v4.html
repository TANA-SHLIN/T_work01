
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#app{max-width:380px;margin:0 auto;padding:12px;min-height:600px;font-family:var(--font-sans);}
.screen{display:none;}.screen.active{display:block;}
.nav-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:0.5px solid var(--color-border-tertiary);}
.nav-tab{flex:1;padding:8px 2px;background:none;border:none;cursor:pointer;font-size:11px;color:var(--color-text-secondary);font-family:var(--font-sans);border-bottom:2px solid transparent;transition:all .15s;}
.nav-tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500;}
.btn{width:100%;padding:11px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;font-family:var(--font-sans);color:var(--color-text-primary);cursor:pointer;margin-top:6px;transition:background .15s;}
.btn:hover{background:var(--color-background-secondary);}
.btn.blue{border-color:#185FA5;color:#185FA5;}
.btn.danger{border-color:#A32D2D;color:#A32D2D;}
.btn.sm{padding:7px 12px;font-size:12px;width:auto;margin-top:0;}
.form-group{margin-bottom:12px;}
.form-group label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary);resize:vertical;}
.form-group textarea{min-height:64px;}
.img-preview{width:100%;height:120px;border-radius:var(--border-radius-md);border:0.5px dashed var(--color-border-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--color-background-secondary);}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-preview .ph{color:var(--color-text-secondary);font-size:12px;text-align:center;}
.img-preview .ph i{font-size:24px;display:block;margin-bottom:4px;}
#fileInput{display:none;}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin:14px 0 8px;}
.group-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);margin:3px 3px 3px 0;transition:all .15s;}
.group-chip.active{background:#E6F1FB;border-color:#185FA5;color:#0C447C;font-weight:500;}
.group-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.group-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:7px;background:var(--color-background-primary);}
.group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.group-info{flex:1;min-width:0;}
.group-info .gname{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.group-info .gcnt{font-size:11px;color:var(--color-text-secondary);}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:4px;font-size:16px;display:flex;align-items:center;}
.card-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:7px;background:var(--color-background-primary);}
.card-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;}
.card-thumb-e{width:36px;height:36px;border-radius:6px;background:var(--color-background-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.card-info{flex:1;min-width:0;}
.card-info .cn{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-info .cg{font-size:11px;color:var(--color-text-secondary);}
.stats-bar{display:flex;gap:8px;margin-bottom:12px;}
.stat{flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px;text-align:center;}
.stat .num{font-size:18px;font-weight:500;color:var(--color-text-primary);}
.stat .lbl{font-size:10px;color:var(--color-text-secondary);}
.mode-sel{display:flex;gap:8px;margin-bottom:14px;}
.mode-btn{flex:1;padding:9px 6px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);font-size:11px;font-family:var(--font-sans);color:var(--color-text-secondary);cursor:pointer;text-align:center;transition:all .15s;}
.mode-btn.active{border-color:#185FA5;color:#185FA5;background:#E6F1FB;font-weight:500;}
.study-area{display:flex;flex-direction:column;align-items:center;}
.card-stack{position:relative;width:310px;height:320px;margin-bottom:14px;}
.flip-card{position:absolute;width:310px;height:320px;perspective:1000px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.flip-back{transform:rotateY(180deg);padding:20px;gap:10px;}
.flip-back .cn{font-size:20px;font-weight:500;color:var(--color-text-primary);text-align:center;}
.flip-back .cd{font-size:13px;color:var(--color-text-secondary);text-align:center;line-height:1.6;}
.flip-back .div{width:36px;height:1px;background:var(--color-border-tertiary);}
.flip-front img{width:100%;height:100%;object-fit:cover;}
.tap-hint{position:absolute;bottom:10px;font-size:11px;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px;}
.swipe-ov{position:absolute;inset:0;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500;opacity:0;pointer-events:none;}
.swipe-ov.l{background:rgba(227,75,74,.15);color:#A32D2D;}
.swipe-ov.r{background:rgba(15,110,86,.12);color:#0F6E56;}
.swipe-hint{display:flex;align-items:center;justify-content:space-between;width:270px;}
.sh{font-size:11px;color:var(--color-text-secondary);display:flex;flex-direction:column;align-items:center;gap:3px;}
.sh i{font-size:20px;}
.sh.l{color:#A32D2D!important;}
.sh.r{color:#0F6E56!important;}
.action-btns{display:flex;gap:18px;margin-top:12px;}
.action-btn{width:52px;height:52px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.action-btn:active{transform:scale(.93);}
.action-btn.wrong{border-color:#A32D2D;color:#A32D2D;}
.action-btn.correct{border-color:#0F6E56;color:#0F6E56;}
.card-counter{font-size:12px;color:var(--color-text-secondary);margin-bottom:7px;}
.quiz-area{display:flex;flex-direction:column;gap:12px;}
.quiz-q{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px 16px;text-align:center;}
.quiz-q .ql{font-size:10px;color:var(--color-text-secondary);margin-bottom:4px;}
.quiz-q .qn{font-size:20px;font-weight:500;color:var(--color-text-primary);}
.quiz-q .qd{font-size:12px;color:var(--color-text-secondary);margin-top:3px;line-height:1.5;}
.quiz-opts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.quiz-opt{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden;cursor:pointer;background:var(--color-background-primary);transition:transform .1s;position:relative;}
.quiz-opt:active{transform:scale(.97);}
.quiz-opt img{width:100%;height:120px;object-fit:cover;display:block;}
.quiz-opt .no-img{width:100%;height:120px;display:flex;align-items:center;justify-content:center;background:var(--color-background-secondary);color:var(--color-text-secondary);flex-direction:column;gap:5px;font-size:11px;}
.quiz-opt.correct{border:2px solid #0F6E56;}
.quiz-opt.wrong{border:2px solid #A32D2D;}
.quiz-opt.disabled{cursor:default;}
.quiz-opt .badge{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;}
.quiz-opt.correct .badge{background:#0F6E56;color:#fff;}
.quiz-opt.wrong .badge{background:#A32D2D;color:#fff;}
.reveal-label{display:none;position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:11px;font-weight:500;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quiz-opt.correct .reveal-label{display:block;background:rgba(15,110,86,.88);color:#fff;}
.quiz-opt.wrong .reveal-label{display:block;background:rgba(162,45,45,.82);color:#fff;}
.result-box{text-align:center;padding:20px 0;}
.result-box .big{font-size:44px;margin-bottom:6px;}
.result-box h3{font-size:17px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;}
.result-box p{font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;}
.modal-wrap{background:rgba(0,0,0,.4);border-radius:var(--border-radius-lg);padding:20px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:18px;width:100%;}
.modal h3{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:14px;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.color-dot.sel{border-color:var(--color-text-primary);}
.empty-msg{text-align:center;padding:36px 0;color:var(--color-text-secondary);font-size:13px;}
.empty-msg i{font-size:32px;display:block;margin-bottom:8px;}
.group-select-area{margin-bottom:14px;}
.group-select-area .label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;}
.all-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);margin:3px 3px 3px 0;}
.all-chip.active{background:#E6F1FB;border-color:#185FA5;color:#0C447C;font-weight:500;}
</style>

<div id="app">
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('cards')"><i class="ti ti-cards" aria-hidden="true"></i> カード</button>
    <button class="nav-tab" onclick="showTab('groups')"><i class="ti ti-folder" aria-hidden="true"></i> グループ</button>
    <button class="nav-tab" onclick="showTab('add')"><i class="ti ti-plus" aria-hidden="true"></i> 追加</button>
    <button class="nav-tab" onclick="showTab('study')"><i class="ti ti-brain" aria-hidden="true"></i> 学習</button>
  </div>

  <div id="cardsScreen" class="screen active">
    <div id="cardList"></div>
    <div id="cardEmpty" class="empty-msg"><i class="ti ti-cards" aria-hidden="true"></i>カードがありません</div>
  </div>

  <div id="groupsScreen" class="screen">
    <button class="btn blue" onclick="showAddGroup()" style="margin-bottom:12px;">
      <i class="ti ti-plus" aria-hidden="true"></i> グループを作成
    </button>
    <div id="addGroupArea" style="display:none;"></div>
    <div id="groupList"></div>
    <div id="groupEmpty" class="empty-msg"><i class="ti ti-folder" aria-hidden="true"></i>グループがありません</div>
  </div>

  <div id="addScreen" class="screen">
    <div class="form-group">
      <label>写真</label>
      <div class="img-preview" onclick="document.getElementById('fileInput').click()" id="imgPreview">
        <div class="ph"><i class="ti ti-camera-plus" aria-hidden="true"></i>タップして写真を選択</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">
    </div>
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="nameInput" placeholder="例：東京タワー" maxlength="60">
    </div>
    <div class="form-group">
      <label>説明</label>
      <textarea id="descInput" placeholder="例：1958年に完成した電波塔。高さ333m。"></textarea>
    </div>
    <div class="form-group">
      <label>グループ（複数選択可）</label>
      <div id="groupChips" style="margin-top:4px;"></div>
    </div>
    <button class="btn blue" onclick="addCard()"><i class="ti ti-plus" aria-hidden="true"></i> カードを追加</button>
  </div>

  <div id="studyScreen" class="screen">
    <div class="group-select-area">
      <div class="label">学習するグループ</div>
      <div id="studyGroupChips"></div>
    </div>
    <div class="mode-sel">
      <button class="mode-btn active" id="modeFlip" onclick="setMode('flip')">
        <i class="ti ti-rotate-clockwise-2" style="font-size:15px;display:block;margin-bottom:2px;" aria-hidden="true"></i>フリップ
      </button>
      <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">
        <i class="ti ti-photo-search" style="font-size:15px;display:block;margin-bottom:2px;" aria-hidden="true"></i>写真選択
      </button>
    </div>
    <div id="studyContent"></div>
  </div>
</div>

<script>
const GROUP_COLORS=['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517','#E24B4A','#888780'];
let cards=[],groups=[],currentImg=null,studyMode='flip',selectedStudyGroups=new Set(['__all__']);
let buildOptionsRef=[];
let isDragging=false,cardMoved=false,startX=0,currentCardEl=null;
let studyQueue=[],studyIndex=0,sCorrect=0,sWrong=0,isFlipped=false;
let quizQueue=[],quizIndex=0,qCorrect=0,qWrong=0,quizAnswered=false;

function save(){try{window.storage.set('fc_cards',JSON.stringify(cards));window.storage.set('fc_groups',JSON.stringify(groups));}catch(e){}}
async function load(){
  try{
    const cr=await window.storage.get('fc_cards');
    const gr=await window.storage.get('fc_groups');
    if(cr&&cr.value)cards=JSON.parse(cr.value);
    if(gr&&gr.value)groups=JSON.parse(gr.value);
  }catch(e){}
  renderAll();
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function groupById(id){return groups.find(g=>g.id===id);}
function groupColor(id){const g=groupById(id);return g?g.color:'#888780';}
function groupName(id){const g=groupById(id);return g?g.name:'?';}
function cardGroups(card){return(card.groups||[]).map(gid=>{const g=groupById(gid);return g?g.name:null;}).filter(Boolean);}

function showTab(tab){
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',['cards','groups','add','study'][i]===tab));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab+'Screen').classList.add('active');
  if(tab==='add')renderGroupChips();
  if(tab==='study'){renderStudyGroupChips();startCurrentMode();}
  if(tab==='cards')renderCards();
  if(tab==='groups')renderGroups();
}

function renderAll(){renderCards();renderGroups();renderGroupChips();renderStudyGroupChips();}

function renderCards(){
  const el=document.getElementById('cardList'),em=document.getElementById('cardEmpty');
  if(!cards.length){el.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  el.innerHTML=cards.map(c=>{
    const gnames=cardGroups(c);
    return`<div class="card-row">
      ${c.img?`<img class="card-thumb" src="${c.img}" alt="">`:`<div class="card-thumb-e"><i class="ti ti-photo-off" style="font-size:16px;color:var(--color-text-secondary)" aria-hidden="true"></i></div>`}
      <div class="card-info">
        <div class="cn">${escH(c.name)}</div>
        <div class="cg">${gnames.length?gnames.map(n=>`<span style="display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:10px;padding:1px 7px;font-size:10px;margin-right:3px;">${escH(n)}</span>`).join(''):'グループなし'}</div>
      </div>
      <button class="icon-btn" onclick="deleteCard(${c.id})" aria-label="削除"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`;
  }).join('');
}

function renderGroups(){
  const el=document.getElementById('groupList'),em=document.getElementById('groupEmpty');
  if(!groups.length){el.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  el.innerHTML=groups.map(g=>{
    const cnt=cards.filter(c=>(c.groups||[]).includes(g.id)).length;
    return`<div class="group-row">
      <div class="group-dot" style="background:${g.color}"></div>
      <div class="group-info"><div class="gname">${escH(g.name)}</div><div class="gcnt">${cnt}枚</div></div>
      <button class="icon-btn" onclick="deleteGroup(${g.id})" aria-label="削除"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`;
  }).join('');
}

function renderGroupChips(){
  const el=document.getElementById('groupChips');
  if(!groups.length){el.innerHTML='<span style="font-size:12px;color:var(--color-text-secondary);">先にグループを作成してください</span>';return;}
  el.innerHTML=groups.map(g=>`
    <span class="group-chip" id="chip_${g.id}" onclick="toggleCardGroup(${g.id})">
      <span class="dot" style="background:${g.color}"></span>${escH(g.name)}
    </span>`).join('');
}

let addCardGroups=new Set();
function toggleCardGroup(gid){
  if(addCardGroups.has(gid))addCardGroups.delete(gid);else addCardGroups.add(gid);
  document.querySelectorAll('[id^="chip_"]').forEach(el=>{
    const id=parseInt(el.id.replace('chip_',''));
    el.classList.toggle('active',addCardGroups.has(id));
  });
}

function renderStudyGroupChips(){
  const el=document.getElementById('studyGroupChips');if(!el)return;
  el.innerHTML=`<span class="all-chip${selectedStudyGroups.has('__all__')?' active':''}" onclick="toggleStudyGroup('__all__')">
    <i class="ti ti-stack-2" style="font-size:13px;" aria-hidden="true"></i> すべて
  </span>`+groups.map(g=>`
    <span class="group-chip${selectedStudyGroups.has(g.id)?' active':''}" onclick="toggleStudyGroup(${g.id})">
      <span class="dot" style="background:${g.color}"></span>${escH(g.name)}
    </span>`).join('');
}

function toggleStudyGroup(gid){
  if(gid==='__all__'){selectedStudyGroups=new Set(['__all__']);}
  else{
    selectedStudyGroups.delete('__all__');
    if(selectedStudyGroups.has(gid))selectedStudyGroups.delete(gid);
    else selectedStudyGroups.add(gid);
    if(!selectedStudyGroups.size)selectedStudyGroups=new Set(['__all__']);
  }
  renderStudyGroupChips();
  startCurrentMode();
}

function getStudyCards(){
  if(selectedStudyGroups.has('__all__'))return cards;
  return cards.filter(c=>(c.groups||[]).some(gid=>selectedStudyGroups.has(gid)));
}

function showAddGroup(){
  const area=document.getElementById('addGroupArea');
  area.style.display='block';
  area.innerHTML=`<div class="modal-wrap"><div class="modal">
    <h3>グループを作成</h3>
    <div class="form-group"><label>グループ名</label><input type="text" id="gnameInput" placeholder="例：動物、建物…" maxlength="30"></div>
    <div class="form-group"><label>カラー</label>
      <div class="color-row">${GROUP_COLORS.map((c,i)=>`<div class="color-dot${i===0?' sel':''}" style="background:${c}" onclick="selectColor(${i})" data-ci="${i}"></div>`).join('')}</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn sm blue" onclick="confirmAddGroup()">作成</button>
      <button class="btn sm" onclick="document.getElementById('addGroupArea').style.display='none'">キャンセル</button>
    </div>
  </div></div>`;
}
let selColorIdx=0;
function selectColor(i){selColorIdx=i;document.querySelectorAll('.color-dot').forEach((d,j)=>d.classList.toggle('sel',i===j));}
function confirmAddGroup(){
  const name=document.getElementById('gnameInput').value.trim();
  if(!name){alert('グループ名を入力してください');return;}
  groups.push({id:Date.now(),name,color:GROUP_COLORS[selColorIdx]});
  document.getElementById('addGroupArea').style.display='none';
  save();renderGroups();renderGroupChips();renderStudyGroupChips();
}
function deleteGroup(id){
  if(!confirm('このグループを削除しますか？\nカード自体は削除されません。'))return;
  groups=groups.filter(g=>g.id!==id);
  cards=cards.map(c=>({...c,groups:(c.groups||[]).filter(gid=>gid!==id)}));
  if(selectedStudyGroups.has(id)){selectedStudyGroups.delete(id);if(!selectedStudyGroups.size)selectedStudyGroups=new Set(['__all__']);}
  save();renderAll();
}

function handleImage(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{currentImg=ev.target.result;document.getElementById('imgPreview').innerHTML=`<img src="${currentImg}" alt="">`;};r.readAsDataURL(f);
}
function addCard(){
  const name=document.getElementById('nameInput').value.trim();
  const desc=document.getElementById('descInput').value.trim();
  if(!name){alert('名称を入力してください');return;}
  cards.push({id:Date.now(),img:currentImg,name,desc,groups:[...addCardGroups]});
  currentImg=null;addCardGroups=new Set();
  document.getElementById('nameInput').value='';
  document.getElementById('descInput').value='';
  document.getElementById('fileInput').value='';
  document.getElementById('imgPreview').innerHTML=`<div class="ph"><i class="ti ti-camera-plus" aria-hidden="true"></i>タップして写真を選択</div>`;
  renderGroupChips();
  save();renderCards();showTab('cards');
}
function deleteCard(id){cards=cards.filter(c=>c.id!==id);save();renderCards();}

function setMode(m){
  studyMode=m;
  document.getElementById('modeFlip').classList.toggle('active',m==='flip');
  document.getElementById('modeQuiz').classList.toggle('active',m==='quiz');
  startCurrentMode();
}
function startCurrentMode(){studyMode==='flip'?initFlip():initQuiz();}

function initFlip(){
  const sc=getStudyCards();
  if(!sc.length){noCardsMsg('学習するカードがありません');return;}
  studyQueue=shuffle([...sc]);studyIndex=0;sCorrect=0;sWrong=0;renderFlipCard();
}
function renderFlipCard(){
  if(studyIndex>=studyQueue.length){showFlipResult();return;}
  isFlipped=false;
  const card=studyQueue[studyIndex],total=studyQueue.length;
  document.getElementById('studyContent').innerHTML=`
    <div class="stats-bar">
      <div class="stat"><div class="num" style="color:#0F6E56">${sCorrect}</div><div class="lbl">覚えた</div></div>
      <div class="stat"><div class="num">${total-studyIndex}</div><div class="lbl">残り</div></div>
      <div class="stat"><div class="num" style="color:#A32D2D">${sWrong}</div><div class="lbl">もう一度</div></div>
    </div>
    <div class="study-area">
      <div class="card-counter">${studyIndex+1} / ${total}</div>
      <div class="card-stack">
        <div class="flip-card" id="mainCard" onclick="flipCard()">
          <div class="flip-inner">
            <div class="flip-front">
              ${card.img?`<img src="${card.img}" alt="">`:`<span style="color:var(--color-text-secondary)"><i class="ti ti-photo-off" style="font-size:36px;" aria-hidden="true"></i></span>`}
              <div class="tap-hint"><i class="ti ti-rotate-clockwise-2" style="font-size:13px;" aria-hidden="true"></i> タップして裏面を見る</div>
              <div class="swipe-ov l" id="ovL">✕ もう一度</div>
              <div class="swipe-ov r" id="ovR">✓ 覚えた</div>
            </div>
            <div class="flip-back">
              <div class="cn">${escH(card.name)}</div>
              <div class="div"></div>
              <div class="cd">${escH(card.desc)||'説明なし'}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="swipe-hint">
        <div class="sh l"><i class="ti ti-arrow-left" aria-hidden="true"></i><span>もう一度</span></div>
        <div class="sh" style="font-size:10px;">スワイプ</div>
        <div class="sh r"><i class="ti ti-arrow-right" aria-hidden="true"></i><span>覚えた！</span></div>
      </div>
      <div class="action-btns">
        <button class="action-btn wrong" onclick="markFlip(false)" aria-label="もう一度"><i class="ti ti-x" aria-hidden="true"></i></button>
        <button class="action-btn correct" onclick="markFlip(true)" aria-label="覚えた"><i class="ti ti-check" aria-hidden="true"></i></button>
      </div>
    </div>`;
  setupSwipe();
}
function flipCard(){const el=document.getElementById('mainCard');if(!el||isDragging)return;isFlipped=!isFlipped;el.classList.toggle('flipped',isFlipped);}
function setupSwipe(){
  const el=document.getElementById('mainCard');if(!el)return;currentCardEl=el;
  el.addEventListener('touchstart',ts,{passive:true});el.addEventListener('touchmove',tm,{passive:false});el.addEventListener('touchend',te,{passive:true});
  el.addEventListener('mousedown',md);window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
}
function ts(e){startX=e.touches[0].clientX;isDragging=false;cardMoved=false;}
function tm(e){const dx=e.touches[0].clientX-startX;if(Math.abs(dx)>8){isDragging=true;e.preventDefault();}if(!isDragging)return;cardMoved=true;moveCard(dx);}
function te(e){const dx=e.changedTouches[0].clientX-startX;if(isDragging&&cardMoved)finishSwipe(dx);isDragging=false;}
function md(e){startX=e.clientX;isDragging=false;cardMoved=false;}
function mm(e){if(e.buttons!==1)return;const dx=e.clientX-startX;if(Math.abs(dx)>8){isDragging=true;cardMoved=true;}if(!isDragging)return;moveCard(dx);}
function mu(e){const dx=e.clientX-startX;if(isDragging&&cardMoved)finishSwipe(dx);isDragging=false;}
function moveCard(dx){
  const el=currentCardEl;if(!el)return;
  el.style.transform=`translateX(${dx}px) rotate(${dx*.07}deg)`;el.style.transition='none';
  const l=document.getElementById('ovL'),r=document.getElementById('ovR');
  if(l&&r){if(dx<-20){l.style.opacity=Math.min(1,(-dx-20)/80);r.style.opacity=0;}else if(dx>20){r.style.opacity=Math.min(1,(dx-20)/80);l.style.opacity=0;}else{l.style.opacity=0;r.style.opacity=0;}}
}
function finishSwipe(dx){
  const el=currentCardEl;if(!el)return;
  if(Math.abs(dx)>80){const d=dx>0?1:-1;el.style.transition='transform .3s ease-in,opacity .3s';el.style.transform=`translateX(${d*400}px) rotate(${d*18}deg)`;el.style.opacity='0';setTimeout(()=>markFlip(d>0),270);}
  else{el.style.transition='transform .3s cubic-bezier(.4,0,.2,1)';el.style.transform='';const l=document.getElementById('ovL'),r=document.getElementById('ovR');if(l)l.style.opacity=0;if(r)r.style.opacity=0;}
}
function markFlip(ok){
  if(ok)sCorrect++;else{sWrong++;studyQueue.push(studyQueue[studyIndex]);}
  studyIndex++;window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);
  setTimeout(renderFlipCard,50);
}
function showFlipResult(){
  const total=sCorrect+sWrong,pct=total>0?Math.round(sCorrect/total*100):0;
  document.getElementById('studyContent').innerHTML=`<div class="result-box"><div class="big">🎉</div><h3>セッション完了！</h3><p>正解率 <strong>${pct}%</strong>（${sCorrect} / ${total}）</p><button class="btn blue" onclick="initFlip()">もう一度学習する</button></div>`;
}

function initQuiz(){
  const sc=getStudyCards();
  if(sc.length<2){noCardsMsg('写真選択モードにはカードが2枚以上必要です');return;}
  quizQueue=shuffle([...sc]);quizIndex=0;qCorrect=0;qWrong=0;renderQuiz();
}
function buildOptions(target,pool){
  const n=Math.min(4,pool.length);
  const others=shuffle(pool.filter(c=>c.id!==target.id)).slice(0,n-1);
  return shuffle([target,...others]);
}
function renderQuiz(){
  if(quizIndex>=quizQueue.length){showQuizResult();return;}
  quizAnswered=false;
  const target=quizQueue[quizIndex];
  const pool=getStudyCards();
  const opts=buildOptions(target,pool.length>=4?pool:cards);
  buildOptionsRef=opts;
  const total=quizQueue.length;
  document.getElementById('studyContent').innerHTML=`
    <div class="stats-bar">
      <div class="stat"><div class="num" style="color:#0F6E56">${qCorrect}</div><div class="lbl">正解</div></div>
      <div class="stat"><div class="num">${total-quizIndex}</div><div class="lbl">残り</div></div>
      <div class="stat"><div class="num" style="color:#A32D2D">${qWrong}</div><div class="lbl">不正解</div></div>
    </div>
    <div class="quiz-area">
      <div class="quiz-q">
        <div class="ql">この名称の写真はどれ？</div>
        <div class="qn">${escH(target.name)}</div>
        ${target.desc?`<div class="qd">${escH(target.desc)}</div>`:''}
      </div>
      <div class="card-counter" style="text-align:center;">${quizIndex+1} / ${total}</div>
      <div class="quiz-opts" id="quizOpts">
        ${opts.map((c,i)=>`<div class="quiz-opt" onclick="answerQuiz(${i},${c.id===target.id},${target.id})">
          ${c.img?`<img src="${c.img}" alt="">`:`<div class="no-img"><i class="ti ti-photo-off" style="font-size:22px;" aria-hidden="true"></i><span>画像なし</span></div>`}
          <div class="reveal-label">${escH(c.name)}</div>
        </div>`).join('')}
      </div>
      <button class="btn" id="qNext" style="display:none;margin-top:4px;" onclick="nextQuiz()">次の問題へ <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    </div>`;
}
function answerQuiz(idx,ok,targetId){
  if(quizAnswered)return;quizAnswered=true;
  Array.from(document.getElementById('quizOpts').children).forEach((el,i)=>{
    el.onclick=null;el.classList.add('disabled');
    if(buildOptionsRef[i].id===targetId){el.classList.add('correct');el.insertAdjacentHTML('beforeend','<div class="badge">✓</div>');}
    else if(i===idx&&!ok){el.classList.add('wrong');el.insertAdjacentHTML('beforeend','<div class="badge">✕</div>');}
  });
  if(ok)qCorrect++;else qWrong++;
  document.getElementById('qNext').style.display='block';
}
function nextQuiz(){quizIndex++;renderQuiz();}
function showQuizResult(){
  const total=qCorrect+qWrong,pct=total>0?Math.round(qCorrect/total*100):0;
  const em=pct>=80?'🎉':pct>=50?'😊':'💪';
  document.getElementById('studyContent').innerHTML=`<div class="result-box"><div class="big">${em}</div><h3>クイズ完了！</h3><p>正解率 <strong>${pct}%</strong>（${qCorrect} / ${total}）</p><button class="btn blue" style="margin-bottom:8px;" onclick="initQuiz()">もう一度挑戦する</button><button class="btn" onclick="setMode('flip')">フリップモードへ</button></div>`;
}
function noCardsMsg(msg){document.getElementById('studyContent').innerHTML=`<div class="empty-msg"><i class="ti ti-cards" aria-hidden="true"></i>${msg}</div>`;}

load();
</script>
